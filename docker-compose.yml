services:
  backend:
    build:
      context: ./backend
      network: host
    volumes:
      - ./data:/app/data
      - ./users.db:/app/users.db
    environment:
      - JWT_SECRET=${JWT_SECRET:-changeme-set-in-.env}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-true}
      - DATA_ROOT=/app/data
      - DB_PATH=/app/users.db
    network_mode: host
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      network: host
    network_mode: host
    depends_on:
      - backend
    restart: unless-stopped
